name: middleware-gpu-collector
module: github.com/GoogleCloudPlatform/opentelemetry-operations-collector/middleware-gpu-collector
display_name: Middleware GPU OpenTelemetry Collector
description: Minimal OpenTelemetry Collector for NVIDIA GPU telemetry, exporting to Middleware via OTLP
blurb: A minimal OpenTelemetry Collector distribution focused on NVIDIA GPU telemetry (DCGM and NVML), exporting to the Middleware platform over OTLP.
build_container: debian
version: ""
opentelemetry_version: 0.151.0
opentelemetry_contrib_version: 0.151.0
opentelemetry_stable_version: 1.57.0
go_version: 1.26.1
binary_name: otelcol-middleware-gpu
build_tags: gpu
boringcrypto: false
docker_repo: ""
components:
    receivers:
        - otlp
        - dcgm
        - nvml
    processors:
        - batch
        - memorylimiter
        - resourcedetection
        - transform
        - metricstransform
        - cumulativetodelta
        - deltatorate
    exporters:
        - otlp
        - otlphttp
        - debug
    extensions:
        - healthcheck
    providers:
        - env
        - file
replaces:
    - from: github.com/GoogleCloudPlatform/opentelemetry-operations-collector
      to: ../../
      reason: Reference root module of repository to find dependency packages.
    - from: github.com/buger/jsonparser
      to: github.com/buger/jsonparser v1.1.2
      reason: Force update buger/jsonparser to v1.1.2 to fix vulnerability
collector_cgo: true
component_module_base: ""
distrogen_version: ""
